<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Accent gradient matching portfolio brand -->
    <linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6e5bff" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#2ce6c6" />
    </linearGradient>
    <filter id="subtle-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- High-contrast bold N-graph node logo for ultimate visibility at 16x16 -->
  <g stroke="url(#nav-grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#subtle-glow)">
    <path d="M 140 372 V 140 L 372 372 V 140" />
  </g>
  
  <!-- Graph node accents at the vertices -->
  <g fill="#2ce6c6" filter="url(#subtle-glow)">
    <circle cx="140" cy="140" r="32" fill="#6e5bff" />
    <circle cx="140" cy="372" r="32" fill="#8e55f7" />
    <circle cx="372" cy="140" r="32" fill="#a855f7" />
    <circle cx="372" cy="372" r="32" fill="#2ce6c6" />
  </g>
</svg>
